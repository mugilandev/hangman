<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hangman Game</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Special+Elite&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a2e;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Courier Prime', monospace;
    color: #e8e0d0;
    background-image:
      radial-gradient(ellipse at 20% 50%, #16213e 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, #0f3460 0%, transparent 50%);
  }

  .container {
    width: 100%;
    max-width: 560px;
    padding: 2rem 1.5rem;
  }

  header {
    text-align: center;
    margin-bottom: 2rem;
  }

  h1 {
    font-family: 'Special Elite', serif;
    font-size: 2.8rem;
    letter-spacing: 0.12em;
    color: #f0c040;
    text-shadow: 0 0 30px rgba(240,192,64,0.3);
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: 0.8rem;
    letter-spacing: 0.25em;
    color: #7a7090;
    text-transform: uppercase;
  }

  .gallows-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 1.5rem;
  }

  canvas {
    border-radius: 8px;
  }

  .attempts-bar {
    text-align: center;
    font-size: 0.82rem;
    letter-spacing: 0.15em;
    color: #7a7090;
    margin-bottom: 1.4rem;
  }

  .attempts-bar span {
    color: #f0c040;
    font-weight: 700;
  }

  .word-display {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 1.2rem;
  }

  .letter-slot {
    width: 34px;
    text-align: center;
    border-bottom: 2px solid #5a5070;
    font-size: 1.5rem;
    font-weight: 700;
    color: #f0c040;
    padding-bottom: 4px;
    min-height: 38px;
    line-height: 1;
    transition: color 0.2s;
  }

  .letter-slot.revealed {
    animation: pop 0.25s ease;
  }

  @keyframes pop {
    0%   { transform: scale(1.5); color: #fff; }
    100% { transform: scale(1); }
  }

  .feedback {
    text-align: center;
    font-size: 0.95rem;
    letter-spacing: 0.1em;
    min-height: 22px;
    margin-bottom: 0.6rem;
    font-weight: 700;
  }

  .feedback.correct { color: #6fcf97; }
  .feedback.wrong   { color: #eb5757; }

  .guessed-letters {
    text-align: center;
    font-size: 0.78rem;
    color: #5a5070;
    letter-spacing: 0.12em;
    min-height: 18px;
    margin-bottom: 1.2rem;
  }

  .keyboard {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    margin-bottom: 1.4rem;
  }

  .key {
    width: 36px;
    height: 36px;
    border-radius: 6px;
    border: 1px solid #3a3460;
    background: #16213e;
    color: #c8c0d8;
    font-family: 'Courier Prime', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, transform 0.1s, opacity 0.2s;
  }

  .key:hover:not(:disabled) {
    background: #2a2450;
    transform: translateY(-2px);
  }

  .key:active:not(:disabled) { transform: scale(0.93); }

  .key.hit  { background: #1a4a2e; border-color: #2d7a4a; color: #6fcf97; }
  .key.miss { background: #3a1a1a; border-color: #7a2a2a; color: #eb5757; }
  .key:disabled { cursor: default; opacity: 0.45; transform: none; }

  .result-card {
    text-align: center;
    border-radius: 10px;
    padding: 1.2rem 1rem;
    margin-bottom: 1rem;
  }

  .result-card.win {
    background: rgba(111,207,151,0.12);
    border: 1px solid rgba(111,207,151,0.3);
  }

  .result-card.lose {
    background: rgba(235,87,87,0.1);
    border: 1px solid rgba(235,87,87,0.25);
  }

  .result-card .headline {
    font-family: 'Special Elite', serif;
    font-size: 1.6rem;
    margin-bottom: 6px;
  }

  .result-card.win  .headline { color: #6fcf97; }
  .result-card.lose .headline { color: #eb5757; }

  .result-card .reveal {
    font-size: 0.85rem;
    color: #9090a8;
    letter-spacing: 0.12em;
  }

  .result-card .reveal strong {
    color: #f0c040;
    letter-spacing: 0.08em;
  }

  .btn-restart {
    display: block;
    margin: 0 auto;
    padding: 0.55rem 2rem;
    border-radius: 6px;
    border: 1px solid #f0c040;
    background: transparent;
    color: #f0c040;
    font-family: 'Courier Prime', monospace;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }

  .btn-restart:hover {
    background: #f0c040;
    color: #1a1a2e;
  }

  .title-wrap {
    position: relative;
    display: inline-block;
    cursor: default;
  }

  .title-wrap .tooltip {
    visibility: hidden;
    opacity: 0;
    background: #0f0f1e;
    border: 1px solid #f0c040;
    color: #c8b870;
    font-family: 'Courier Prime', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 6px;
    white-space: nowrap;
    position: absolute;
    bottom: -38px;
    left: 50%;
    transform: translateX(-50%);
    transition: opacity 0.25s ease;
    pointer-events: none;
    z-index: 10;
  }

  .title-wrap .tooltip::before {
    content: '';
    position: absolute;
    top: -6px;
    left: 50%;
    transform: translateX(-50%);
    border-width: 0 5px 6px 5px;
    border-style: solid;
    border-color: transparent transparent #f0c040 transparent;
  }

  .title-wrap:hover .tooltip {
    visibility: visible;
    opacity: 1;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="title-wrap">
      <h1>HANGMAN</h1>
      <span class="tooltip">Developed &amp; tested by Mugilan Dev</span>
    </div>
    <p class="subtitle">Guess the word before it's too late</p>
  </header>

  <div class="gallows-wrap">
    <canvas id="gallows" width="200" height="180"></canvas>
  </div>

  <p class="attempts-bar" id="attempts-bar">Attempts remaining: <span id="att-count">6</span></p>

  <div class="word-display" id="word-display"></div>

  <p class="feedback" id="feedback"></p>
  <p class="guessed-letters" id="guessed-disp"></p>

  <div id="result-box"></div>

  <div class="keyboard" id="keyboard"></div>

  <button class="btn-restart" onclick="initGame()">New Game ↻</button>

</div>

<script>
const WORDS = [
  "apple","bridge","candle","dragon","forest","garden","island",
  "jungle","mirror","planet","rocket","silver","temple","turtle",
  "winter","knight","butter","castle","flower","pirate","shadow",
  "legend","anchor","bottle","cactus","daisy","engine","falcon"
];

let word, hidden, wrongCount, guessed, gameOver;

function initGame() {
  word = WORDS[Math.floor(Math.random() * WORDS.length)];
  hidden = Array(word.length).fill('_');
  wrongCount = 0;
  guessed = new Set();
  gameOver = false;
  document.getElementById('result-box').innerHTML = '';
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  buildKeyboard();
  render();
}

function buildKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  'abcdefghijklmnopqrstuvwxyz'.split('').forEach(ch => {
    const btn = document.createElement('button');
    btn.className = 'key';
    btn.textContent = ch.toUpperCase();
    btn.id = 'key-' + ch;
    btn.onclick = () => guess(ch);
    kb.appendChild(btn);
  });
}

function guess(ch) {
  if (gameOver || guessed.has(ch)) return;
  guessed.add(ch);
  const btn = document.getElementById('key-' + ch);
  const fb = document.getElementById('feedback');

  if (word.includes(ch)) {
    word.split('').forEach((c, i) => { if (c === ch) hidden[i] = ch; });
    fb.textContent = 'Correct!';
    fb.className = 'feedback correct';
    if (btn) { btn.classList.add('hit'); btn.disabled = true; }
  } else {
    wrongCount++;
    fb.textContent = 'Wrong!';
    fb.className = 'feedback wrong';
    if (btn) { btn.classList.add('miss'); btn.disabled = true; }
  }
  render();
  checkEnd();
}

function checkEnd() {
  const rb = document.getElementById('result-box');
  if (!hidden.includes('_')) {
    gameOver = true;
    rb.innerHTML = `<div class="result-card win">
      <div class="headline">🎉 You Win!</div>
      <p class="reveal">The word was <strong>${word.toUpperCase()}</strong></p>
    </div>`;
    disableAll();
  } else if (wrongCount >= 6) {
    gameOver = true;
    rb.innerHTML = `<div class="result-card lose">
      <div class="headline">💀 Game Over</div>
      <p class="reveal">The word was <strong>${word.toUpperCase()}</strong></p>
    </div>`;
    disableAll();
  }
}

function disableAll() {
  document.querySelectorAll('.key').forEach(b => b.disabled = true);
}

function render() {
  const wd = document.getElementById('word-display');
  wd.innerHTML = hidden.map((c, i) => {
    const revealed = c !== '_';
    return `<div class="letter-slot${revealed ? ' revealed' : ''}">${revealed ? c.toUpperCase() : ''}</div>`;
  }).join('');

  document.getElementById('att-count').textContent = 6 - wrongCount;
  document.getElementById('guessed-disp').textContent =
    guessed.size ? 'Guessed: ' + [...guessed].join(' ').toUpperCase() : '';

  drawGallows();
}

function drawGallows() {
  const cv = document.getElementById('gallows');
  const ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, 200, 180);

  ctx.strokeStyle = '#5a5070';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';

  // Base structure
  ctx.beginPath();
  ctx.moveTo(20, 170); ctx.lineTo(180, 170); // base
  ctx.moveTo(60, 170); ctx.lineTo(60, 20);   // pole
  ctx.moveTo(60, 20);  ctx.lineTo(120, 20);  // top
  ctx.moveTo(120, 20); ctx.lineTo(120, 42);  // rope
  ctx.stroke();

  ctx.strokeStyle = '#e8e0d0';
  ctx.fillStyle = '#e8e0d0';

  if (wrongCount >= 1) { // head
    ctx.beginPath();
    ctx.arc(120, 54, 12, 0, Math.PI * 2);
    ctx.stroke();
  }
  if (wrongCount >= 2) { // body
    ctx.beginPath();
    ctx.moveTo(120, 66); ctx.lineTo(120, 108);
    ctx.stroke();
  }
  if (wrongCount >= 3) { // left arm
    ctx.beginPath();
    ctx.moveTo(120, 76); ctx.lineTo(100, 96);
    ctx.stroke();
  }
  if (wrongCount >= 4) { // right arm
    ctx.beginPath();
    ctx.moveTo(120, 76); ctx.lineTo(140, 96);
    ctx.stroke();
  }
  if (wrongCount >= 5) { // left leg
    ctx.beginPath();
    ctx.moveTo(120, 108); ctx.lineTo(100, 135);
    ctx.stroke();
  }
  if (wrongCount >= 6) { // right leg
    ctx.beginPath();
    ctx.moveTo(120, 108); ctx.lineTo(140, 135);
    ctx.stroke();
    // X eyes
    ctx.strokeStyle = '#eb5757';
    ctx.lineWidth = 1.5;
    [-1,1].forEach(s => {
      ctx.beginPath();
      ctx.moveTo(116 + s*5, 50); ctx.lineTo(120 + s*5, 58);
      ctx.moveTo(120 + s*5, 50); ctx.lineTo(116 + s*5, 58);
      ctx.stroke();
    });
  }
}

document.addEventListener('keydown', e => {
  if (!gameOver && /^[a-zA-Z]$/.test(e.key)) guess(e.key.toLowerCase());
});

initGame();
</script>
</body>
</html>
